services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      CORS_ORIGINS: http://localhost:5173
      MONGODB_URI: mongodb://mongo:27017/teamboard
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-long-random-string}
      JWT_EXPIRES_IN: 1d

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:3000/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  mongo-data:
